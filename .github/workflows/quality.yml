name: Quality checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python lint, types, and tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version-file: .python-version
          enable-cache: true
      - name: Install quality tools only
        run: |
          args=(sync --only-group dev)
          if [[ -f uv.lock ]]; then
            args+=(--locked)
          fi
          uv "${args[@]}"
      - name: Ruff
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .
      - name: BasedPyright
        run: uv run --no-sync basedpyright
      - name: Pytest
        run: uv run --no-sync python -m pytest

  native:
    name: C++ style, build, and shell lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native quality tools
        run: sudo apt-get update && sudo apt-get install -y clang-format shellcheck
      - name: clang-format
        run: |
          mapfile -t files < <(rg --files -g '*.cpp' -g '*.hpp' -g '*.cu' -g '*.cuh')
          clang-format --dry-run --Werror "${files[@]}"
      - name: Compile and run the CPU C++ example
        run: |
          g++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow \
            -I. leetcode/cpp/two_sum.cpp tests/cpp/test_two_sum.cpp \
            -o /tmp/cpp-two-sum
          /tmp/cpp-two-sum
      - name: ShellCheck
        run: |
          mapfile -t files < <(rg --files scripts docker -g '*.sh')
          shellcheck docker/bashrc "${files[@]}"

  rust:
    name: Rust format, Clippy, and tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked
