# Common dev and v2rayA Lite sidecar definitions. Select one GPU override, one
# workspace override (bind/copy), and one persistence override; the container
# script assembles them safely.
name: ${COMPOSE_PROJECT_NAME:-programming-lab}

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
        UBUNTU_MIRROR: ${UBUNTU_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ubuntu}
        UBUNTU_PORTS_MIRROR: ${UBUNTU_PORTS_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ubuntu-ports}
        NVIDIA_APT_MIRROR: ${NVIDIA_APT_MIRROR:-https://developer.download.nvidia.cn/compute/cuda/repos}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NVM_NODEJS_ORG_MIRROR: ${NVM_NODEJS_ORG_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/nodejs-release}
        RUSTUP_DIST_SERVER: ${RUSTUP_DIST_SERVER:-https://mirrors.tuna.tsinghua.edu.cn/rustup}
        RUSTUP_UPDATE_ROOT: ${RUSTUP_UPDATE_ROOT:-https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup}
    image: ${COMPOSE_PROJECT_NAME:-programming-lab}:dev
    init: true
    restart: unless-stopped
    working_dir: /workspace
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
    shm_size: 8gb
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ports:
      - "${V2RAYA_WEB_BIND_ADDRESS:-127.0.0.1}:${V2RAYA_WEB_PORT:-2017}:2017"
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      UV_PROJECT_ENVIRONMENT: /home/coder/.venvs/programming-lab
      UV_CACHE_DIR: /home/coder/.cache/uv
      UV_PYTHON_PREFERENCE: only-managed
      UV_LINK_MODE: copy
      UV_CONCURRENT_DOWNLOADS: ${UV_CONCURRENT_DOWNLOADS:-4}
      UV_DEFAULT_INDEX: ${PYPI_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      PIP_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      NVM_NODEJS_ORG_MIRROR: ${NVM_NODEJS_ORG_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/nodejs-release}
      RUSTUP_DIST_SERVER: ${RUSTUP_DIST_SERVER:-https://mirrors.tuna.tsinghua.edu.cn/rustup}
      RUSTUP_UPDATE_ROOT: ${RUSTUP_UPDATE_ROOT:-https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup}
      CCACHE_DIR: /home/coder/.cache/ccache
      TRITON_CACHE_DIR: /home/coder/.cache/triton
      TILELANG_CACHE_DIR: /home/coder/.cache/tilelang
      V2RAYA_HTTP_PROXY: ${V2RAYA_HTTP_PROXY:-http://127.0.0.1:20171}
      V2RAYA_SOCKS_PROXY: ${V2RAYA_SOCKS_PROXY:-socks5h://127.0.0.1:20170}
      V2RAYA_NO_PROXY: ${V2RAYA_NO_PROXY:-localhost,127.0.0.1}
      CODEX_HTTP_PROXY: ${CODEX_HTTP_PROXY:-}
      CODEX_SOCKS_PROXY: ${CODEX_SOCKS_PROXY:-}
      CODEX_NO_PROXY: ${CODEX_NO_PROXY:-}

  # v2rayA runs as an isolated Lite-mode sidecar but shares dev's network
  # namespace. Processes in dev can therefore use 127.0.0.1:20170/20171
  # without granting either container NET_ADMIN or privileged mode.
  proxy:
    image: ${V2RAYA_IMAGE:-mzz2017/v2raya:latest}
    init: true
    restart: unless-stopped
    network_mode: service:dev
    depends_on:
      dev:
        condition: service_started
    command:
      - --lite
      - --config
      - /etc/v2raya
      - --log-level
      - ${V2RAYA_LOG_LEVEL:-info}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
