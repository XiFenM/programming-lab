services:
  dev:
    volumes:
      - uv-venvs:/home/coder/.venvs
      - uv-python:/home/coder/.local/share/uv/python
      - uv-cache:/home/coder/.cache/uv
      - ccache:/home/coder/.cache/ccache
      - triton-cache:/home/coder/.cache/triton
      - tilelang-cache:/home/coder/.cache/tilelang
      - cargo-registry:/home/coder/.cargo/registry
      - cargo-git:/home/coder/.cargo/git
  proxy:
    volumes:
      - v2raya-data:/etc/v2raya

volumes:
  uv-venvs:
  uv-python:
  uv-cache:
  ccache:
  triton-cache:
  tilelang-cache:
  cargo-registry:
  cargo-git:
  v2raya-data:
